name: publish-release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3). Optional for release event runs."
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            module: saferalloc-natives-linux-x86_64
          - os: ubuntu-latest
            module: saferalloc-natives-android
          - os: ubuntu-24.04-arm
            module: saferalloc-natives-linux-aarch64
          - os: windows-latest
            module: saferalloc-natives-windows-x86_64
          - os: macos-15-intel
            module: saferalloc-natives-macos-x86_64
          - os: macos-latest
            module: saferalloc-natives-macos-aarch64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Setup Android SDK
        if: matrix.module == 'saferalloc-natives-android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.module == 'saferalloc-natives-android'
        shell: bash
        run: |
          sdkmanager "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=${ANDROID_SDK_ROOT}/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Run core tests (Linux)        
        if: matrix.os != 'windows-latest'
        run: |
          ./gradlew :saferalloc:test

      - name: Compute version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "Unable to determine release tag" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Publish release to Maven Central
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        shell: bash
        run: |
          ./gradlew -PVERSION_NAME=${VERSION} :${{ matrix.module }}:publishMavenJavaPublicationToSonatypeRepository

      - name: Publish release to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          ./gradlew -PVERSION_NAME=${VERSION} :${{ matrix.module }}:publishMavenJavaPublicationToGitHubPackagesRepository

  publish-core:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Run core tests (Linux)
        run: |
          ./gradlew :saferalloc:test

      - name: Compute version
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.release.tag_name }}"
          fi
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "Unable to determine release tag" >&2
            exit 1
          fi
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Publish core release to Maven Central
        env:
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          ./gradlew -PVERSION_NAME=${VERSION} :saferalloc:publishMavenJavaPublicationToSonatypeRepository

      - name: Publish core release to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./gradlew -PVERSION_NAME=${VERSION} :saferalloc:publishMavenJavaPublicationToGitHubPackagesRepository
